name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  format-and-copyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run astyle
        run: pre-commit run --all-files --show-diff-on-failure astyle_py

      - name: Run copyright check
        run: pre-commit run --all-files --show-diff-on-failure check-copyright

  python-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python stubs
        run: python -m py_compile stubs/*.pyi

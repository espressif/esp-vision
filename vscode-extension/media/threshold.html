<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src ${cspSource} data:; style-src ${cspSource}; script-src 'nonce-${nonce}';">
<link rel="stylesheet" href="${cssUri}">
</head>
<body>
<main>
    <section class="frames">
        <figure>
            <figcaption>
                <span>Source</span>
                <button id="freezeButton" type="button">Freeze</button>
            </figcaption>
            <div class="frame-box">
                <img id="sourceImage" alt="" />
                <span id="sourceEmpty" class="empty-label">No frame yet</span>
            </div>
        </figure>
        <figure>
            <figcaption>Mask</figcaption>
            <div class="frame-box">
                <canvas id="maskCanvas"></canvas>
            </div>
        </figure>
    </section>
    <section class="controls">
        <div class="row" data-channel="L">
            <label>L</label>
            <span class="range">0 – 100</span>
            <div class="sliders">
                <input type="range" data-bound="min" min="0" max="100" step="1" value="0" />
                <input type="range" data-bound="max" min="0" max="100" step="1" value="100" />
            </div>
            <div class="values">
                <input type="number" data-bound="min" min="0" max="100" step="1" value="0" />
                <input type="number" data-bound="max" min="0" max="100" step="1" value="100" />
            </div>
        </div>
        <div class="row" data-channel="A">
            <label>A</label>
            <span class="range">-128 – 127</span>
            <div class="sliders">
                <input type="range" data-bound="min" min="-128" max="127" step="1" value="-128" />
                <input type="range" data-bound="max" min="-128" max="127" step="1" value="127" />
            </div>
            <div class="values">
                <input type="number" data-bound="min" min="-128" max="127" step="1" value="-128" />
                <input type="number" data-bound="max" min="-128" max="127" step="1" value="127" />
            </div>
        </div>
        <div class="row" data-channel="B">
            <label>B</label>
            <span class="range">-128 – 127</span>
            <div class="sliders">
                <input type="range" data-bound="min" min="-128" max="127" step="1" value="-128" />
                <input type="range" data-bound="max" min="-128" max="127" step="1" value="127" />
            </div>
            <div class="values">
                <input type="number" data-bound="min" min="-128" max="127" step="1" value="-128" />
                <input type="number" data-bound="max" min="-128" max="127" step="1" value="127" />
            </div>
        </div>
    </section>
    <section class="tuple">
        <code id="tupleText">(0, 100, -128, 127, -128, 127)</code>
        <button id="copyButton" type="button">Copy</button>
        <button id="resetButton" type="button">Reset</button>
    </section>
    <footer id="metadata"></footer>
</main>
<script nonce="${nonce}" src="${jsUri}"></script>
</body>
</html>
